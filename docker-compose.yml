services:
  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - CLIENT_URL=http://localhost:5173

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000
    ports:
      - "5173:80"
    depends_on:
      - server
